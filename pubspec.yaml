  palette_generator: ^0.3.3+4
  onesignal_flutter: ^5.3.4
  path: ^1.8.3
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  share_plus: ^10.1.4
  sqlite3: ^2.4.6
  sqlite3_flutter_libs: ^0.5.24
  package_info_plus: ^8.0.0
  wakelock_plus: ^1.3.3
  shimmer: ^3.0.0
  sidebar_with_animation:
    git:
